spack:
  view: false

  packages:
    all:
      require:
      - target=x86_64_v3
    tbb:
      require: intel-tbb

  specs:
  - group: compiler
    specs:
    - gcc@16 build_type=Release +profiled +strip

  - group: "gcc@15 specs"
    specs:
    - zlib-ng@2.2.4
    - zlib-ng@2.0.7
    - zlib-ng +ipo
    - zlib-ng build_type=Debug
    - zlib-ng %clang
    - tcl ^zlib-ng@2.2.4
    - tcl ^zlib-ng@2.0.7 %clang
    - tcl ^zlib-ng %gcc@14
    - hdf5+mpi^openmpi
    - hdf5~mpi
    - hdf5+hl+mpi ^mpich
    - trilinos ^openmpi
    - trilinos +hdf5 ^hdf5+hl+mpi ^mpich
    - mpileaks
    - lmod@8.7.67
    - environment-modules
    - macsio@1.1+scr ^scr@2.0.0~fortran ^silo~fortran ^hdf5~fortran
    - julia ^llvm ~clang ~gold ~lldb ~lua ~polly compiler-rt=none libcxx=none libunwind=none targets=x86 ^openblas threads=openmp
    - vim
    override:
      packages:
        c:
          prefer: [gcc@15]
        cxx:
          prefer: [gcc@15]
        fortran:
          prefer: [gcc@15]

  - group: scalapacks
    needs: [compiler]
    specs:
    - matrix:
      - [netlib-scalapack]
      - [^mpich, ^openmpi]
      - [^openblas, ^netlib-lapack]
    - matrix:
      - [py-scipy ^openblas, armadillo ^openblas, netlib-lapack, openmpi, mpich, elpa ^mpich]
    override:
      packages:
        c:
          prefer: [gcc@16]
        cxx:
          prefer: [gcc@16]
        fortran:
          prefer: [gcc@16]
  # Miscellaneous specs use the default group
  # - zlib-ng@2.2.4%gcc@10
  #- matrix:
  #  - [ zlib-ng@2.2.4, tcl ^zlib-ng@2.0.7 ]
  #  - [ '%clang@14' ]

  concretizer:
    unify: false
    reuse: false
    targets:
      granularity: generic

  config:
    installer: new
    misc_cache: "$user_cache_path/cache"
    db_lock_timeout: 120
    shared_linking:
      missing_library_policy: warn
    install_tree:
      root: /home/software/spack
      padded_length: 256
      projections:
        all: "{architecture.platform}-{architecture.target}/{name}-{version}-{hash}"

