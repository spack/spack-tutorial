# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  definitions:
  - mpis: [mpich]
  - mpis: [openmpi]
    when: 'env.get("SPACK_STACK_USE_OPENMPI", "") == "1"'
  - lapacks: [openblas, netlib-lapack]
  - mpi_packages: [netlib-scalapack]
  - serial_packages: [py-scipy]

  specs:
  - group: compiler
    specs:
    - gcc@16
    - lmod@8.7.67
    override:
      packages:
        c:
          prefer: [gcc@15]
        cxx:
          prefer: [gcc@15]
        fortran:
          prefer: [gcc@15]
  - group: stack
    needs: [compiler]
    specs:
    - matrix:
      - [$mpi_packages]
      - [$^mpis]
      - [$^lapacks]
    - matrix:
      - [$serial_packages]
      - [$^lapacks]
      exclude:
      - "py-scipy ^netlib-lapack"
    override:
      packages:
        c:
          prefer: [gcc@16]
        cxx:
          prefer: [gcc@16]
        fortran:
          prefer: [gcc@16]
  view: false
  concretizer:
    unify: false
  modules:
    default:
      enable:
      - lmod
      roots:
        lmod: modules
      lmod:
        hierarchy:
        - mpi
        - lapack
        core_specs:
        - '%gcc@15'
        hash_length: 0
        include:
        - gcc
        exclude:
        - '%gcc@15'
        - autoconf
        all:
          environment:
            set:
              '{name}_ROOT': '{prefix}'
        openmpi:
          environment:
            set:
              SLURM_MPI_TYPE: pmi2
              OMPI_MCA_btl_openib_warn_default_gid_prefix: '0'
        projections:
          all: '{name}/{version}'
